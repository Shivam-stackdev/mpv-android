name: Build mpv-android-mod
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Grant Execute Permission
        # We point to the folder shown in your screenshot
        run: chmod +x mpv-android/gradlew

      - name: Build with Gradle
        # 'working-directory' tells GitHub to run the command INSIDE that folder
        working-directory: ./mpv-android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-mod-apk
          # This search pattern will find the APK inside the subfolders
          path: "**/build/outputs/apk/debug/*.apk"
          
