name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:   # 👈 job ka naam (important)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # ✅ FIX JNI STEP (correct place)
      - name: Fix JNI libs (mpv)
        run: |
          cd app/src/main

          rm -rf jniLibs
          mkdir -p jniLibs/arm64-v8a

          wget https://github.com/mpv-android/mpv-android/releases/latest/download/mpv-android-arm64-v8a.apk -O mpv.apk

          unzip mpv.apk "lib/arm64-v8a/*.so" -d extracted

          cp extracted/lib/arm64-v8a/*.so jniLibs/arm64-v8a/

          ls -la jniLibs/arm64-v8a/

      - name: Give permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: mpv-android-2025-12-27/**/build/outputs/apk/debug/*.apk
