name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Fix JNI libs (mpv)
  run: |
    cd app/src/main

    rm -rf jniLibs
    mkdir -p jniLibs/arm64-v8a

    APK_URL=$(curl -s https://api.github.com/repos/mpv-android/mpv-android/releases/latest \
      | grep browser_download_url \
      | grep '\.apk' \
      | head -n 1 \
      | cut -d '"' -f 4)

    echo "Downloading from: $APK_URL"

    if [ -z "$APK_URL" ]; then
      echo "❌ APK URL not found"
      exit 1
    fi

    wget "$APK_URL" -O mpv.apk

    unzip mpv.apk "lib/arm64-v8a/*.so" -d extracted

    cp extracted/lib/arm64-v8a/*.so jniLibs/arm64-v8a/

    ls -la jniLibs/arm64-v8a/
      - name: Give permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: mpv-android-2025-12-27/**/build/outputs/apk/debug/*.apk
