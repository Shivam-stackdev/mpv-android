name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
- name: Fix JNI libs (mpv)
  run: |
    cd mpv-android-2025-12-27/app/src/main

    rm -rf jniLibs
    mkdir -p jniLibs/arm64-v8a

    # Download official mpv android release APK
    wget https://github.com/mpv-android/mpv-android/releases/latest/download/mpv-android-arm64-v8a.apk -O mpv.apk

    # Extract .so files
    unzip mpv.apk "lib/arm64-v8a/*.so" -d extracted

    cp extracted/lib/arm64-v8a/*.so jniLibs/arm64-v8a/

    echo "JNI libs copied:"
    ls -la jniLibs/arm64-v8a/
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mpv-android-2025-12-27   # 👈 MAGIC LINE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Give permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: mpv-android-2025-12-27/**/build/outputs/apk/debug/*.apk
