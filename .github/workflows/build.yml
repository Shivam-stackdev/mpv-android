name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Fix permissions
        run: |
          chmod -R +x buildscripts
          chmod +x gradlew

      - name: Export env vars
        run: bash buildscripts/include/ci.sh export >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf
          pip3 install meson

      - name: Download build deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          bash buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/mpv-android-2025-12-27/gh-cache"

      - name: Build APK
        run: bash buildscripts/include/ci.sh build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-build-result
          path: mpv-android-2025-12-27/app/build/outputs/apk/default/debug/app-default-armeabi-v7a-debug.apk
          if-no-files-found: error
