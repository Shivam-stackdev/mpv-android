
name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # 🔧 Fix permission (important)
      - name: Give execute permission
        run: chmod +x buildscripts/include/ci.sh

      # 🌱 Export env
      - name: Export env vars
        run: bash buildscripts/include/ci.sh export >> $GITHUB_ENV

      # ⚡ Cache
      - uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      # 📦 Install dependencies
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf
          pip3 install meson

      # ⬇️ Download deps
      - name: Download deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          bash buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      # 🏗️ Build APK
      - name: Build APK
        run: bash buildscripts/include/ci.sh build

      # 📤 Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: mpv-android
          path: app/build/outputs/apk/**/**/*.apk
