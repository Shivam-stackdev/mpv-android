name: build

on:
  - push
  - pull_request

jobs:
  linux:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # ☕ Java
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # 🔧 Fix permissions (VERY IMPORTANT)
      - name: Fix permissions (all scripts)
        run: chmod -R +x buildscripts

      # 🌱 Export env
      - name: Export env vars
        run: bash buildscripts/include/ci.sh export >> $GITHUB_ENV

      # ⚡ Cache
      - uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      # 📦 Install deps
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf
          pip3 install meson

      # ⬇️ Download deps
      - name: Download deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          bash buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/mpv-android-2025-12-27/gh-cache"

      # 🏗 Build APK
      - name: Build APK
        run: bash buildscripts/include/ci.sh build

      # 🔍 Debug (see where APK is)
      - name: Show APK files
        run: find . -name "*.apk"

      # 📤 Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: mpv-android
          path: "**/*.apk"
