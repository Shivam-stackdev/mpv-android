name: build

on:
  - push
  - pull_request

jobs:
  linux:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Fix permissions
        run: chmod -R +x buildscripts

      - name: Export env vars
        run: bash buildscripts/include/ci.sh export >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

