name: build

on:
  - push
  - pull_request

jobs:
  linux:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Fix permissions
        run: chmod -R +x buildscripts

      - name: Export env vars
        run: bash buildscripts/include/ci.sh export >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf
          pip3 install meson

      - name: Download deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          bash buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/mpv-android-2025-12-27/gh-cache"

      - name: Build APK
        run: bash buildscripts/include/ci.sh build

      - name: Find APK
        run: find . -name "*.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: mpv-android
          path: "**/*.apk"
