name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mpv-android-2025-12-27

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install Dependencies
        run: |
          chmod -R +x buildscripts
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf
          pip3 install meson

      - name: Export Env Vars
        run: bash buildscripts/include/ci.sh export >> $GITHUB_ENV

      - name: Download Deps
        run: bash buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/mpv-android-2025-12-27/gh-cache"

      - name: Build APK
        # We use 'assembleDebug' directly if ci.sh is failing to package
        run: bash buildscripts/include/ci.sh build

      - name: Find APKs (Debug Log)
        # This will list EVERY apk found so you can see the path in the logs
        run: |
          echo "Checking all directories for APK files..."
          find ${{ github.workspace }} -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-android-output
          # THIS IS THE FIX: It searches the entire workspace, ignoring subfolder limits
          path: |
            ${{ github.workspace }}/**/*.apk
          if-no-files-found: error
          
