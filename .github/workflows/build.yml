name: Build MPV Android

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download prebuilt libraries
        run: |
          mkdir -p app/src/main/jniLibs
          curl -L https://github.com/mpv-android/mpv-android/releases/latest/download/mpv-android-libs.tar.gz -o libs.tar.gz || true
          ls

     - name: Build with Gradle
        run: |
          chmod +x mpv-android-2025-12-27/gradlew
          cd mpv-android-2025-12-27
          ./gradlew assembleDefaultDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-android-debug
          path: mpv-android-2025-12-27/app/build/outputs/apk/default/debug/*.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-android-debug
          path: app/build/outputs/apk/default/debug/*.apk
