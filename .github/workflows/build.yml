name: build

on:
  - push
  - pull_request

jobs:
  linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Fix permissions
        run: chmod -R +x buildscripts

      - name: Export env vars
        run: bash buildscripts/include/ci.sh export >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf
          pip3 install meson

      - name: Download and install deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          bash buildscripts/include/ci.sh download
          bash buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build native libs
        run: |
          bash buildscripts/include/ci.sh build
          find . -name "*.so" | head -20

      - name: Fix jniLibs
        run: |
          rm -rf app/src/main/jniLibs
          mkdir -p app/src/main/jniLibs/arm64-v8a
          find . -name "*.so" -path "*/arm64*" -exec cp {} app/src/main/jniLibs/arm64-v8a/ \; || true
          ls -la app/src/main/jniLibs/arm64-v8a/

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Find APK
        run: find . -name "*.apk" -type f

      - uses: actions/upload-artifact@v4
        with:
          name: mpv-android
          path: "app/build/outputs/apk/**/*.apk"
