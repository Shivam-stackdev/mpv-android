name: Build MPV Android

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download prebuilt mpv libs
        run: |
          cd mpv-android-2025-12-27/app/src/main
          rm -f jniLibs
          mkdir -p jniLibs/arm64-v8a
          curl -L "https://github.com/mpv-android/mpv-android/releases/download/2025-12-27-release/mpv-android-2025-12-27-universal.apk" -o arm64.apk
          unzip -o arm64.apk "lib/arm64-v8a/*" -d tmp || true
          cp tmp/lib/arm64-v8a/*.so jniLibs/arm64-v8a/ || true
          rm -rf tmp arm64.apk
          ls -la jniLibs/arm64-v8a/

      - name: Build with Gradle
        run: |
          chmod +x mpv-android-2025-12-27/gradlew
          cd mpv-android-2025-12-27
          ./gradlew assembleDefaultDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpv-android-debug
          path: mpv-android-2025-12-27/app/build/outputs/apk/default/debug/*.apk
